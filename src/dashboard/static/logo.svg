<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="cloud" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect width="48" height="48" rx="13" fill="url(#bg)"/>
  <!-- Subtle inner glow -->
  <rect width="48" height="48" rx="13" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
  <!-- Cloud shape -->
  <path d="M13 29.5c-2.5 0-4.5-2-4.5-4.5 0-2.1 1.5-3.9 3.5-4.3C12.5 17.8 15.3 15.5 18.5 15.5c2.6 0 4.9 1.5 6.1 3.6C25.5 18.4 26.9 18 28.5 18c3.6 0 6.5 2.9 6.5 6.5S32.1 31 28.5 31H13z" fill="url(#cloud)" filter="url(#glow)"/>
  <!-- "I" letter inside cloud -->
  <text x="16.5" y="27.5" font-family="'Inter','Segoe UI',sans-serif" font-size="10" font-weight="800" fill="#6366f1" letter-spacing="-0.5">I</text>
  <!-- "C" letter inside cloud -->
  <text x="22" y="27.5" font-family="'Inter','Segoe UI',sans-serif" font-size="10" font-weight="800" fill="#3b82f6" letter-spacing="-0.5">C</text>
  <!-- Small code cursor blinking -->
  <rect x="30" y="20" width="1.5" height="8" rx="0.75" fill="#7c3aed" opacity="0.7"/>
  <!-- Infrastructure lines below cloud -->
  <line x1="15" y1="34" x2="15" y2="38" stroke="rgba(255,255,255,0.5)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="21" y1="34" x2="21" y2="40" stroke="rgba(255,255,255,0.6)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="27" y1="34" x2="27" y2="38" stroke="rgba(255,255,255,0.5)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="33" y1="34" x2="33" y2="36" stroke="rgba(255,255,255,0.4)" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Infrastructure nodes -->
  <circle cx="15" cy="39" r="1.5" fill="rgba(255,255,255,0.7)"/>
  <circle cx="21" cy="41" r="1.5" fill="rgba(255,255,255,0.8)"/>
  <circle cx="27" cy="39" r="1.5" fill="rgba(255,255,255,0.7)"/>
  <circle cx="33" cy="37" r="1.5" fill="rgba(255,255,255,0.6)"/>
  <!-- Connecting line at bottom -->
  <line x1="15" y1="39" x2="33" y2="37" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
</svg>
