<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="40%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="cloud2" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.97"/>
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="0.92"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="80" height="80" rx="20" fill="url(#bg2)" filter="url(#shadow2)"/>
  <!-- Shine effect -->
  <ellipse cx="30" cy="20" rx="25" ry="15" fill="rgba(255,255,255,0.08)"/>
  <!-- Cloud -->
  <path d="M20 49c-4.2 0-7.5-3.3-7.5-7.5 0-3.5 2.5-6.5 5.8-7.2C19 30 23.5 26 29 26c4.3 0 8.1 2.4 10 6 1.5-1 3.3-1.5 5.2-1.5 5.8 0 10.5 4.7 10.5 10.5S50 51.5 44.2 51.5H20z" fill="url(#cloud2)" filter="url(#glow2)"/>
  <!-- "I" lettermark -->
  <text x="25" y="45" font-family="'Inter','Segoe UI',sans-serif" font-size="17" font-weight="800" fill="#6366f1">I</text>
  <!-- "C" lettermark -->
  <text x="34.5" y="45" font-family="'Inter','Segoe UI',sans-serif" font-size="17" font-weight="800" fill="#3b82f6">C</text>
  <!-- Cursor blink -->
  <rect x="48" y="33" width="2" height="13" rx="1" fill="#7c3aed" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  <!-- Infrastructure lines -->
  <line x1="22" y1="55" x2="22" y2="62" stroke="rgba(255,255,255,0.5)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="32" y1="55" x2="32" y2="66" stroke="rgba(255,255,255,0.6)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="42" y1="55" x2="42" y2="62" stroke="rgba(255,255,255,0.5)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="52" y1="55" x2="52" y2="59" stroke="rgba(255,255,255,0.4)" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Infrastructure nodes -->
  <circle cx="22" cy="64" r="2.5" fill="rgba(255,255,255,0.7)"/>
  <circle cx="32" cy="68" r="2.5" fill="rgba(255,255,255,0.85)"/>
  <circle cx="42" cy="64" r="2.5" fill="rgba(255,255,255,0.7)"/>
  <circle cx="52" cy="61" r="2.5" fill="rgba(255,255,255,0.55)"/>
  <!-- Connecting mesh -->
  <line x1="22" y1="64" x2="32" y2="68" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="32" y1="68" x2="42" y2="64" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="42" y1="64" x2="52" y2="61" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="22" y1="64" x2="42" y2="64" stroke="rgba(255,255,255,0.15)" stroke-width="0.8"/>
</svg>
