<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IaCraft — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0015;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(120, 50, 255, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(50, 100, 255, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(168, 85, 247, 0.08) 0%, transparent 50%);
            color: #fafafa;
            overflow: hidden;
        }

        /* Floating orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 20s ease-in-out infinite;
            pointer-events: none;
        }
        .orb-1 { width: 400px; height: 400px; background: rgba(168, 85, 247, 0.3); top: -100px; left: -100px; }
        .orb-2 { width: 350px; height: 350px; background: rgba(59, 130, 246, 0.25); bottom: -80px; right: -80px; animation-delay: -7s; }
        .orb-3 { width: 200px; height: 200px; background: rgba(139, 92, 246, 0.2); top: 50%; left: 60%; animation-delay: -14s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(20px, 10px) scale(1.02); }
        }

        .login-container {
            width: 420px;
            position: relative;
            z-index: 1;
        }

        /* Logo area */
        .logo-area {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #a855f7, #6366f1, #3b82f6);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 16px;
            box-shadow: 0 8px 32px rgba(168, 85, 247, 0.3);
        }
        .logo-area h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #e2e8f0, #a855f7, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo-area p {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            margin-top: 6px;
        }

        /* Glass card */
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 36px;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255,255,255,0.7);
            margin-bottom: 8px;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper .icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            opacity: 0.4;
        }
        .form-group input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fafafa;
            font-size: 14px;
            font-family: 'Inter', system-ui, sans-serif;
            outline: none;
            transition: all 0.2s;
        }
        .form-group input:focus {
            border-color: rgba(168, 85, 247, 0.5);
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.15);
            background: rgba(255, 255, 255, 0.08);
        }
        .form-group input::placeholder {
            color: rgba(255,255,255,0.25);
        }

        .remember-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 13px;
        }
        .remember-row label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
        }
        .remember-row input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #a855f7;
            cursor: pointer;
        }
        .forgot-link {
            color: #a855f7;
            text-decoration: none;
            font-size: 13px;
        }
        .forgot-link:hover { color: #c084fc; }

        .btn-login {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #a855f7, #7c3aed, #6366f1);
            color: white;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', system-ui, sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 16px rgba(168, 85, 247, 0.3);
        }
        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(168, 85, 247, 0.4);
        }
        .btn-login:active { transform: translateY(0); }
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            color: #f87171;
            font-size: 13px;
            text-align: center;
            margin-top: 12px;
            display: none;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            gap: 12px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        }
        .divider span {
            color: rgba(255,255,255,0.3);
            font-size: 12px;
        }

        .btn-guest {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            background: rgba(255,255,255,0.03);
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            font-family: 'Inter', system-ui, sans-serif;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-guest:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.2);
            color: #fafafa;
        }

        .footer-text {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="login-container">
    <div class="logo-area">
        <div class="logo-icon" style="background:none;box-shadow:none"><img src="/static/logo-large.svg" width="64" height="64"></div>
        <h1>IaCraft</h1>
        <p>Craft Cloud Infrastructure from Natural Language</p>
    </div>

    <div class="login-card">
        <form onsubmit="return handleLogin(event)">
            <div class="form-group">
                <label>Username</label>
                <div class="input-wrapper">
                    <span class="icon">&#128100;</span>
                    <input type="text" id="username" placeholder="Enter username" autocomplete="username" required>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <span class="icon">&#128274;</span>
                    <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" required>
                </div>
            </div>

            <div class="remember-row">
                <label><input type="checkbox" id="remember" checked> Remember me</label>
            </div>

            <button type="submit" class="btn-login" id="btnLogin">Sign In</button>
            <div class="error-msg" id="errorMsg"></div>

            <div class="divider"><span>or</span></div>

            <button type="button" class="btn-guest" onclick="guestLogin()">Continue as Guest</button>
        </form>
    </div>

    <div class="footer-text">
        IaCraft &bull; 11 LLM Providers &bull; AWS / Azure / GCP &bull; Enterprise Grade
    </div>
</div>

<script>
    async function handleLogin(e) {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const remember = document.getElementById('remember').checked;
        const btn = document.getElementById('btnLogin');
        const errEl = document.getElementById('errorMsg');

        btn.disabled = true;
        btn.textContent = 'Signing in...';
        errEl.style.display = 'none';

        try {
            const resp = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password, remember})
            });
            const data = await resp.json();

            if (data.success) {
                window.location.href = '/dashboard';
            } else {
                errEl.textContent = data.error || 'Invalid credentials';
                errEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        } catch(err) {
            errEl.textContent = 'Connection error';
            errEl.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Sign In';
        }
    }

    function guestLogin() {
        fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: 'guest', password: 'guest', remember: false})
        }).then(r => r.json()).then(data => {
            if (data.success) window.location.href = '/dashboard';
        });
    }

    // Auto-focus username
    document.getElementById('username').focus();
</script>

</body>
</html>
