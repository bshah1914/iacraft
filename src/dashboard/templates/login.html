<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - IaCraft</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #09090b;
            --bg-card: #18181b;
            --bg-input: #18181b;
            --border-default: #27272a;
            --border-hover: #3f3f46;
            --border-focus: #7c3aed;
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --text-placeholder: #71717a;
            --text-muted: #52525b;
            --violet-600: #7c3aed;
            --violet-500: #8b5cf6;
            --violet-400: #a78bfa;
            --violet-glow: rgba(124, 58, 237, 0.25);
            --error-text: #fca5a5;
            --error-bg: rgba(239, 68, 68, 0.08);
            --error-border: rgba(239, 68, 68, 0.15);
            --radius-lg: 12px;
            --radius-xl: 16px;
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Radial violet glow */
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* Dot grid pattern overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, #27272a 1px, transparent 1px);
            background-size: 24px 24px;
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
        }

        .login-wrapper {
            width: 100%;
            max-width: 400px;
            padding: 0 20px;
            position: relative;
            z-index: 1;
            animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes logoPulse {
            0%, 100% { filter: drop-shadow(0 0 6px rgba(124, 58, 237, 0.3)); }
            50% { filter: drop-shadow(0 0 14px rgba(124, 58, 237, 0.55)); }
        }

        .logo-area {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-area img {
            width: 44px;
            height: 44px;
            margin-bottom: 16px;
            animation: logoPulse 3s ease-in-out infinite;
        }

        .logo-area h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .logo-area p {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-xl);
            padding: 28px;
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.1),
                        0 8px 40px rgba(0, 0, 0, 0.35);
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .form-group input[type="text"],
        .form-group input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            font-size: 14px;
            font-family: inherit;
            color: var(--text-primary);
            background: var(--bg-input);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-lg);
            outline: none;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        .form-group input[type="text"]::placeholder,
        .form-group input[type="password"]::placeholder {
            color: var(--text-placeholder);
        }

        .form-group input[type="text"]:hover,
        .form-group input[type="password"]:hover {
            border-color: var(--border-hover);
        }

        .form-group input[type="text"]:focus,
        .form-group input[type="password"]:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px var(--violet-glow);
        }

        .remember-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 22px;
        }

        .remember-row input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border: 1px solid var(--border-default);
            border-radius: 4px;
            background: var(--bg-input);
            cursor: pointer;
            position: relative;
            transition: border-color 0.15s ease, background 0.15s ease;
            flex-shrink: 0;
        }

        .remember-row input[type="checkbox"]:hover {
            border-color: var(--border-hover);
        }

        .remember-row input[type="checkbox"]:checked {
            background: var(--violet-600);
            border-color: var(--violet-600);
        }

        .remember-row input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 5px;
            width: 4px;
            height: 8px;
            border: solid #fff;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .remember-row input[type="checkbox"]:focus-visible {
            box-shadow: 0 0 0 3px var(--violet-glow);
        }

        .remember-row label {
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            user-select: none;
        }

        .btn-primary {
            display: block;
            width: 100%;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            color: #fff;
            background: var(--violet-600);
            border: none;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: background 0.15s ease, transform 0.1s ease;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--violet-500);
        }

        .btn-primary:active:not(:disabled) {
            transform: scale(0.98);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-primary:focus-visible {
            outline: none;
            box-shadow: 0 0 0 3px var(--violet-glow);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-default);
        }

        .divider span {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: lowercase;
        }

        .btn-ghost {
            display: block;
            width: 100%;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            color: var(--text-secondary);
            background: transparent;
            border: 1px solid var(--border-default);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: border-color 0.15s ease, color 0.15s ease, transform 0.1s ease;
        }

        .btn-ghost:hover {
            border-color: var(--border-hover);
            color: var(--text-primary);
        }

        .btn-ghost:active {
            transform: scale(0.98);
        }

        .btn-ghost:focus-visible {
            outline: none;
            box-shadow: 0 0 0 3px var(--violet-glow);
        }

        .error-msg {
            display: none;
            margin-bottom: 18px;
            padding: 10px 12px;
            font-size: 13px;
            color: var(--error-text);
            background: var(--error-bg);
            border: 1px solid var(--error-border);
            border-radius: var(--radius-lg);
        }

        .footer {
            text-align: center;
            margin-top: 28px;
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 0.01em;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="logo-area">
            <img src="/static/logo.svg" alt="IaCraft">
            <h1>IaCraft</h1>
            <p>Craft Cloud Infrastructure from Natural Language</p>
        </div>

        <div class="card">
            <div class="error-msg" id="errorMsg"></div>

            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" autocomplete="username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
                </div>

                <div class="remember-row">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Remember me</label>
                </div>

                <button type="submit" class="btn-primary" id="btnLogin">Sign In</button>
            </form>

            <div class="divider"><span>or</span></div>

            <button type="button" class="btn-ghost" onclick="guestLogin()">Continue as Guest</button>
        </div>

        <div class="footer">IaCraft v2.0 &middot; 11 LLM Providers &middot; AWS / Azure / GCP</div>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const btn = document.getElementById('btnLogin');
            const errEl = document.getElementById('errorMsg');
            btn.disabled = true;
            btn.textContent = 'Signing in...';
            errEl.style.display = 'none';
            try {
                const resp = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password, remember})
                });
                const data = await resp.json();
                if (data.success) {
                    window.location.href = '/dashboard';
                } else {
                    errEl.textContent = data.error || 'Invalid credentials';
                    errEl.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Sign In';
                }
            } catch(err) {
                errEl.textContent = 'Connection error';
                errEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        }

        function guestLogin() {
            fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: 'guest', password: 'guest', remember: false})
            }).then(r => r.json()).then(data => {
                if (data.success) window.location.href = '/dashboard';
            });
        }
        document.getElementById('username').focus();
    </script>
</body>
</html>
